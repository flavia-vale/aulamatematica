<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf7"/>
      <stop offset="1" stop-color="#e7e5e4"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1c1917" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="14" fill="#1c1917"/>
    <text x="30" y="44" font-family="Georgia, serif" font-weight="700" font-size="36" fill="#fafaf7" text-anchor="middle">∑</text>
  </g>
  <text x="160" y="125" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#1c1917">Aulas de Matemática BH</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Georgia, serif" font-weight="500" font-size="72" fill="#1c1917">Aulas particulares de</text>
  <text x="80" y="370" font-family="Georgia, serif" font-style="italic" font-weight="500" font-size="72" fill="#1c1917">matemática online.</text>

  <!-- Subline -->
  <text x="80" y="450" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#57534e">Reforço escolar com professora da UFMG.</text>
  <text x="80" y="490" font-family="Inter, sans-serif" font-weight="400" font-size="30" fill="#57534e">Aula diagnóstica gratuita.</text>

  <!-- Bottom badge -->
  <g transform="translate(80, 540)">
    <rect width="200" height="40" rx="20" fill="#047857"/>
    <text x="100" y="27" font-family="Inter, sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">★ Aulas 100% online</text>
  </g>

  <!-- Decorative formulas -->
  <g font-family="Georgia, serif" font-style="italic" fill="#1c1917" fill-opacity="0.08">
    <text x="900" y="200" font-size="120">∫</text>
    <text x="1050" y="320" font-size="80">π</text>
    <text x="950" y="450" font-size="60">f(x)</text>
    <text x="1080" y="550" font-size="50">√x</text>
  </g>
</svg>